<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Response</title>
<link rel="stylesheet" href="/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body { background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 100%); min-height: 100vh; padding: 20px 0; }
.public-wrapper { max-width: 640px; margin: 20px auto; padding: 0 16px; }

/* Brand header on form */
.brand-header {
  background: white; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 24px; border-bottom: 4px solid var(--brand-color, var(--primary));
}
.brand-top {
  display: flex; gap: 16px; align-items: center; margin-bottom: 12px;
}
.brand-logo {
  width: 64px; height: 64px; border-radius: 12px; object-fit: contain;
  background: var(--gray-50); padding: 6px; flex-shrink: 0;
}
.brand-logo-placeholder {
  width: 64px; height: 64px; border-radius: 12px;
  background: var(--brand-color, var(--primary)); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 800; flex-shrink: 0;
}
.brand-name {
  font-size: 20px; font-weight: 800; color: var(--gray-900); line-height: 1.2;
}
.brand-contact {
  font-size: 13px; color: var(--gray-600); margin-top: 12px; line-height: 1.6;
  border-top: 1px solid var(--gray-100); padding-top: 12px;
}
.brand-contact div { display: inline-block; margin-right: 16px; }
.brand-contact a { color: var(--brand-color, var(--primary)); text-decoration: none; }
@media (max-width: 540px) { .brand-contact div { display: block; margin-right: 0; margin-bottom: 4px; } }

.form-body {
  background: white;
  padding: 28px;
}
.form-body.rounded-bottom { border-radius: 0 0 var(--radius-lg) var(--radius-lg); }

.event-badge {
  display: inline-block; padding: 4px 10px;
  background: var(--brand-color, var(--primary)); color: white;
  border-radius: 100px; font-size: 12px; font-weight: 600;
  margin-bottom: 12px;
}

.form-body h2 { font-size: 24px; font-weight: 700; margin-bottom: 6px; color: var(--gray-900); }
.form-body .form-desc { color: var(--gray-600); margin-bottom: 20px; font-size: 14px; }

/* Submit button uses brand color */
.btn-brand {
  background: var(--brand-color, var(--primary)) !important;
  color: white !important;
  box-shadow: 0 4px 14px color-mix(in srgb, var(--brand-color, var(--primary)) 35%, transparent);
}

.success-screen { text-align: center; padding: 60px 20px; background: white; border-radius: var(--radius-lg); }
.success-icon {
  font-size: 64px; margin-bottom: 16px;
  display: inline-block; animation: pop 0.5s ease-out;
}
@keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }

/* Powered by footer */
.powered-by-footer {
  text-align: center; padding: 14px;
  background: white;
  border-top: 1px solid var(--gray-100);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  font-size: 12px; color: var(--gray-500);
}
.powered-by-footer a {
  color: var(--primary); text-decoration: none; font-weight: 600;
}
.powered-by-footer a:hover { text-decoration: underline; }
.powered-by-footer img {
  height: 14px; vertical-align: middle; margin-right: 4px;
}
</style>
</head>
<body>

<div class="public-wrapper">
  <div id="formContainer">
    <div class="text-center" style="padding:60px; background:white; border-radius:var(--radius-lg);">
      <div class="loader loader-lg"></div>
      <p style="margin-top:16px; color:var(--gray-500);">Loading form...</p>
    </div>
  </div>
</div>

<script>
const publicUrl = window.location.pathname.split('/').pop();

async function loadForm() {
  try {
    const res = await fetch(`/api/forms/public/${publicUrl}`);
    const data = await res.json();
    
    if (!data.success) {
      document.getElementById('formContainer').innerHTML = `
        <div class="success-screen">
          <div style="font-size:48px;">😕</div>
          <h2 style="margin:12px 0; color:var(--gray-900);">Form Not Available</h2>
          <p style="color:var(--gray-600);">${data.message}</p>
        </div>
      `;
      return;
    }
    
    renderForm(data.form, data.poweredBy);
  } catch (e) {
    document.getElementById('formContainer').innerHTML = `<div class="success-screen"><p>Failed to load form. Please try again.</p></div>`;
  }
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function renderForm(form, poweredBy) {
  const b = form.branding || {};
  const brandColor = b.primaryColor || '#4f46e5';
  document.documentElement.style.setProperty('--brand-color', brandColor);
  
  // Brand header
  const hasBranding = b.companyName || b.contactNumber || b.contactEmail || b.address || b.website || b.logoUrl;
  
  let brandHeaderHTML = '';
  if (hasBranding) {
    const logoHTML = b.logoUrl 
      ? `<img src="${b.logoUrl}" class="brand-logo" alt="Logo">`
      : `<div class="brand-logo-placeholder">${(b.companyName || 'B')[0].toUpperCase()}</div>`;
    
    const contactBits = [];
    if (b.contactNumber) contactBits.push(`📞 <a href="tel:${escapeHtml(b.contactNumber)}">${escapeHtml(b.contactNumber)}</a>`);
    if (b.contactEmail) contactBits.push(`✉️ <a href="mailto:${escapeHtml(b.contactEmail)}">${escapeHtml(b.contactEmail)}</a>`);
    if (b.website) contactBits.push(`🌐 <a href="${escapeHtml(b.website)}" target="_blank">${escapeHtml(b.website.replace(/^https?:\/\//, ''))}</a>`);
    if (b.address) contactBits.push(`📍 ${escapeHtml(b.address)}`);
    
    brandHeaderHTML = `
      <div class="brand-header">
        <div class="brand-top">
          ${logoHTML}
          <div>
            <div class="brand-name">${escapeHtml(b.companyName || 'Welcome')}</div>
            ${b.website ? `<div style="font-size:13px; color:var(--gray-500);">${escapeHtml(b.website.replace(/^https?:\/\//, ''))}</div>` : ''}
          </div>
        </div>
        ${contactBits.length ? `<div class="brand-contact">${contactBits.map(c => `<div>${c}</div>`).join('')}</div>` : ''}
      </div>
    `;
  }
  
  // Form fields
  const fieldsHtml = form.fields.map(f => {
    const req = f.required ? 'required' : '';
    const star = f.required ? ' <span style="color:var(--danger);">*</span>' : '';
    let input = '';
    
    if (f.type === 'textarea') {
      input = `<textarea class="form-control" name="${f.fieldId}" placeholder="${escapeHtml(f.placeholder || '')}" ${req}></textarea>`;
    } else if (f.type === 'select') {
      input = `<select class="form-control" name="${f.fieldId}" ${req}>
        <option value="">-- Select --</option>
        ${f.options.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('')}
      </select>`;
    } else if (f.type === 'radio') {
      input = f.options.map((o, i) => `
        <label style="display:block; margin:6px 0; cursor:pointer;">
          <input type="radio" name="${f.fieldId}" value="${escapeHtml(o)}" ${i === 0 && f.required ? 'required' : ''}> ${escapeHtml(o)}
        </label>
      `).join('');
    } else if (f.type === 'checkbox') {
      input = f.options.map(o => `
        <label style="display:block; margin:6px 0; cursor:pointer;">
          <input type="checkbox" name="${f.fieldId}" value="${escapeHtml(o)}"> ${escapeHtml(o)}
        </label>
      `).join('');
    } else {
      input = `<input type="${f.type}" class="form-control" name="${f.fieldId}" placeholder="${escapeHtml(f.placeholder || '')}" ${req}>`;
    }
    
    return `<div class="form-group"><label class="form-label">${escapeHtml(f.label)}${star}</label>${input}</div>`;
  }).join('');
  
  // Powered by footer (silent marketing)
  const poweredByHTML = poweredBy ? `
    <div class="powered-by-footer">
      Powered by <a href="${escapeHtml(poweredBy.websiteUrl || '/')}" target="_blank">
        ${poweredBy.logoUrl ? `<img src="${poweredBy.logoUrl}" alt="">` : '📋 '}${escapeHtml(poweredBy.siteName)}
      </a> — Create your own form QR
    </div>
  ` : '';
  
  document.getElementById('formContainer').innerHTML = `
    ${brandHeaderHTML}
    <div class="form-body${hasBranding ? '' : ' rounded-bottom'}" style="${hasBranding ? '' : 'border-radius:var(--radius-lg) var(--radius-lg) 0 0;'}">
      ${form.eventName ? `<div class="event-badge">🎯 ${escapeHtml(form.eventName)}</div>` : ''}
      <h2>${escapeHtml(form.name)}</h2>
      ${form.description ? `<p class="form-desc">${escapeHtml(form.description)}</p>` : ''}
      <form id="submitForm">
        ${fieldsHtml}
        <button type="submit" class="btn btn-brand btn-block btn-lg" id="submitBtn">Submit</button>
      </form>
    </div>
    ${poweredByHTML}
  `;
  
  document.getElementById('submitForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>';
    
    const data = {};
    form.fields.forEach(f => {
      if (f.type === 'checkbox') {
        const checked = Array.from(document.querySelectorAll(`input[name="${f.fieldId}"]:checked`)).map(c => c.value);
        data[f.fieldId] = checked;
      } else if (f.type === 'radio') {
        const sel = document.querySelector(`input[name="${f.fieldId}"]:checked`);
        data[f.fieldId] = sel ? sel.value : '';
      } else {
        const el = document.querySelector(`[name="${f.fieldId}"]`);
        data[f.fieldId] = el ? el.value : '';
      }
    });
    
    const res = await fetch(`/api/forms/public/${publicUrl}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data })
    });
    const result = await res.json();
    
    btn.disabled = false;
    btn.textContent = 'Submit';
    
    if (result.success) {
      document.getElementById('formContainer').innerHTML = `
        <div class="success-screen">
          <div class="success-icon">✅</div>
          <h2 style="color:var(--gray-900); margin-bottom:8px;">Thank You!</h2>
          <p style="color:var(--gray-600);">${escapeHtml(result.message)}</p>
        </div>
        ${poweredByHTML}
      `;
    } else {
      alert(result.message);
    }
  });
}

loadForm();
</script>

</body>
</html>
